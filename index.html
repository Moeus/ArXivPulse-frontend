<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Cup Paper — Daily Academic Brew</title>
    <meta name="description"
        content="Making research reading as effortless and refreshing as morning coffee. Daily Cup Paper brews the essence of academic research daily.">
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Import Sans-serif & Serif fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Roboto:wght@300;400;500;700&display=swap"
        rel="stylesheet">
</head>
<body class="bg-background-light text-text-main font-sans antialiased relative">
    <!-- Subtle paper texture background overlay -->
    <div class="pointer-events-none fixed inset-0 z-[-1] opacity-[0.04]"
        style="background-image: radial-gradient(#2D2A26 0.4px, transparent 0.4px); background-size: 14px 14px;"></div>
    <!-- Very subtle warm gradient backdrop -->
    <div class="pointer-events-none fixed inset-0 z-[-2]"
        style="background: radial-gradient(ellipse at 30% 20%, rgba(196, 139, 84, 0.03) 0%, transparent 50%), radial-gradient(ellipse at 70% 80%, rgba(92, 107, 123, 0.02) 0%, transparent 50%);">
    </div>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
</body>
</html>
